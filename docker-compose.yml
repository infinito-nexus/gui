services:
  # ---------------------------------------------------------
  # Database (PostgreSQL)
  # ---------------------------------------------------------
  db:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: ${POSTGRES_CONTAINER_NAME:-infinito-deployer-db}

    env_file:
      - path: .env
        required: false

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-infinito_deployer}
      POSTGRES_USER: ${POSTGRES_USER:-infinito}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-infinito}

    volumes:
      - postgres_data:/var/lib/postgresql/data
    tmpfs:
      - /tmp
      - /var/run/postgresql
    security_opt:
      - no-new-privileges:true

    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

    restart: ${RESTART_POLICY}

  # ---------------------------------------------------------
  # Catalog generator (writes roles/list.json into STATE_DIR)
  # ---------------------------------------------------------
  catalog:
    image: ${INFINITO_NEXUS_IMAGE}
    container_name: infinito-deployer-catalog

    depends_on:
      init-state-perms:
        condition: service_completed_successfully

    env_file:
      - path: .env
        required: false

    environment:
      INFINITO_REPO_PATH: ${INFINITO_REPO_PATH}
      STATE_DIR: ${STATE_DIR}
      CATALOG_DIR: ${STATE_DIR}/catalog

    volumes:
      - type: ${INFINITO_REPO_MOUNT_TYPE:-volume}
        source: ${INFINITO_REPO_MOUNT_SOURCE:-infinito_repo}
        target: ${INFINITO_REPO_PATH}
      - ${STATE_HOST_PATH}:${STATE_DIR}
    group_add:
      - "10900"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    entrypoint: ["sh", "-lc"]
    command:
      - |
        set -euo pipefail
        mkdir -p "$${CATALOG_DIR}/roles"
        repo_src="${INFINITO_SRC_DIR:-/opt/src/infinito}"
        repo_dst="${INFINITO_REPO_PATH}"
        if [ ! -d "$${repo_dst}/roles" ] || [ -z "$$(find "$${repo_dst}/roles" -mindepth 1 -maxdepth 1 -print -quit 2>/dev/null)" ]; then
          echo "→ Seeding repo from $${repo_src} into $${repo_dst}"
          mkdir -p "$${repo_dst}"
          cp -a "$${repo_src}/." "$${repo_dst}/"
        fi
        pythonpath_prefix=""
        if ! python3 -c "import yaml" >/dev/null 2>&1; then
          catalog_pylib="/tmp/catalog-pylib"
          rm -rf "$${catalog_pylib}"
          python3 -m pip install --disable-pip-version-check --no-cache-dir --target "$${catalog_pylib}" pyyaml >/dev/null
          pythonpath_prefix="$${catalog_pylib}:"
        fi
        cd "$${repo_dst}"
        echo "→ Generating invokable roles list into $${CATALOG_DIR}/roles/list.json"
        PYTHONPATH="$${pythonpath_prefix}$${repo_dst}" python3 -m cli.meta.applications.invokable --format json \
          > "$${CATALOG_DIR}/roles/list.json"
        echo "✔ Catalog generated."
        tail -f /dev/null

    healthcheck:
      test:
        - CMD-SHELL
        - test -s "$$CATALOG_DIR/roles/list.json"
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 5s

    restart: ${RESTART_POLICY}

  init-manager-token:
    build:
      context: ${API_BUILD_CONTEXT}
      dockerfile: ${API_DOCKERFILE}
      # Use host network during build so apt/pip can reach cache-package
      # at its static compose IP 172.28.0.31 — the docker bridge is
      # routed from host, but BuildKit's default isolated network is not
      # (req 018). Two-phase harness guarantees cache-package is healthy
      # BEFORE this build runs; if the cache is down the conditional
      # logic in the Dockerfile passes empty args and falls back.
      network: host
      args:
        INFINITO_CACHE_APT_PROXY:     "${INFINITO_CACHE_APT_PROXY:-}"
        INFINITO_CACHE_PIP_INDEX_URL: "${INFINITO_CACHE_PIP_INDEX_URL:-}"

    command:
      - sh
      - -lc
      - |
        set -euo pipefail
        install -d -o 10003 -g 10900 -m 0750 /auth
        token="$$(openssl rand -hex 32)"
        printf '%s\n' "$${token}" > /auth/token
        chown 10003:10900 /auth/token
        chmod 0440 /auth/token

    user: "0:0"
    volumes:
      - manager_auth:/auth

    restart: "no"

  init-state-perms:
    build:
      context: ${API_BUILD_CONTEXT}
      dockerfile: ${API_DOCKERFILE}
      network: host
      args:
        INFINITO_CACHE_APT_PROXY:     "${INFINITO_CACHE_APT_PROXY:-}"
        INFINITO_CACHE_PIP_INDEX_URL: "${INFINITO_CACHE_PIP_INDEX_URL:-}"

    environment:
      STATE_DIR: ${STATE_DIR}
      STATE_HOST_UID: ${STATE_HOST_UID:-}
      STATE_HOST_GID: ${STATE_HOST_GID:-}

    command:
      - sh
      - -lc
      - |
        set -euo pipefail
        state_uid="$${STATE_HOST_UID:-$$(stat -c '%u' "$${STATE_DIR}")}"
        state_gid="$${STATE_HOST_GID:-$$(stat -c '%g' "$${STATE_DIR}")}"
        install -d -o "$${state_uid}" -g "$${state_gid}" -m 0755 "$${STATE_DIR}"
        install -d -o 10001 -g 10900 -m 2770 \
          "$${STATE_DIR}/workspaces" \
          "$${STATE_DIR}/jobs"
        install -d -o 10001 -g 10900 -m 2775 \
          "$${STATE_DIR}/catalog"
        # Heal pre-hardening workspace dirs that were created when the api
        # ran as root. Without this the api (uid 10001) cannot create the
        # atomic temp files that PUT /api/workspaces/<id>/files/... uses,
        # which manifests in the UI as "Inventory sync failed: HTTP 500".
        for d in "$${STATE_DIR}/workspaces"/*/; do
          [ -d "$$d" ] || continue
          owner="$$(stat -c '%u:%g' "$$d")"
          if [ "$$owner" != "10001:10900" ]; then
            chown -R 10001:10900 "$$d"
            find "$$d" -type d -exec chmod 2770 {} +
          fi
        done

    user: "0:0"
    volumes:
      - ${STATE_HOST_PATH}:${STATE_DIR}

    restart: "no"

  # ---------------------------------------------------------
  # API
  # ---------------------------------------------------------
  api:
    build:
      context: ${API_BUILD_CONTEXT}
      dockerfile: ${API_DOCKERFILE}
      network: host
      args:
        INFINITO_CACHE_APT_PROXY:     "${INFINITO_CACHE_APT_PROXY:-}"
        INFINITO_CACHE_PIP_INDEX_URL: "${INFINITO_CACHE_PIP_INDEX_URL:-}"

    container_name: ${API_CONTAINER_NAME}

    env_file:
      - path: .env
        required: false

    environment:
      INFINITO_REPO_PATH: ${INFINITO_REPO_PATH}
      STATE_DIR: ${STATE_DIR}
      STATE_HOST_PATH: ${STATE_HOST_PATH}

      APP_ENV: ${APP_ENV}
      APP_HOST: ${API_APP_HOST}
      APP_PORT: ${API_APP_PORT}

      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-infinito_deployer}
      POSTGRES_USER: ${POSTGRES_USER:-infinito}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-infinito}

      ROLE_CATALOG_LIST_JSON: ${STATE_DIR}/catalog/roles/list.json
      ROLE_CATALOG_CATEGORIES_YML: ${ROLE_CATALOG_CATEGORIES_YML}

      JOB_RUNNER_IMAGE: ${JOB_RUNNER_IMAGE}
      # Fallback source when JOB_RUNNER_IMAGE is empty: container_runner.py
      # already does `os.getenv("JOB_RUNNER_IMAGE") or os.getenv("INFINITO_NEXUS_IMAGE")`,
      # so passing the catalog image through makes that fallback actually work.
      INFINITO_NEXUS_IMAGE: ${INFINITO_NEXUS_IMAGE}
      JOB_RUNNER_REPO_DIR: ${JOB_RUNNER_REPO_DIR:-/opt/src/infinito}
      JOB_RUNNER_WORKDIR: ${JOB_RUNNER_WORKDIR:-/workspace}
      JOB_RUNNER_REPO_HOST_PATH: ${JOB_RUNNER_REPO_HOST_PATH:-}
      JOB_RUNNER_DOCKER_ARGS: ${JOB_RUNNER_DOCKER_ARGS:-}
      JOB_RUNNER_ANSIBLE_ARGS: ${JOB_RUNNER_ANSIBLE_ARGS:-}
      JOB_RUNNER_SKIP_CLEANUP: ${JOB_RUNNER_SKIP_CLEANUP:-false}
      JOB_RUNNER_SKIP_BUILD: ${JOB_RUNNER_SKIP_BUILD:-false}
      DOCKER_NETWORK_NAME: ${DOCKER_NETWORK_NAME}
      RUNNER_MANAGER_URL: ${RUNNER_MANAGER_URL:-http://runner-manager:8001}
      MANAGER_TOKEN_FILE: ${MANAGER_TOKEN_FILE:-/run/manager/token}
      INFINITO_ENFORCE_DIGEST_PINNING: ${INFINITO_ENFORCE_DIGEST_PINNING:-}

    volumes:
      - type: ${INFINITO_REPO_MOUNT_TYPE:-volume}
        source: ${INFINITO_REPO_MOUNT_SOURCE:-infinito_repo}
        target: ${INFINITO_REPO_PATH}
        read_only: true
      - ${STATE_HOST_PATH}:${STATE_DIR}
      - manager_auth:/run/manager:ro
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    command:
      - sh
      - -lc
      - umask 0002 && exec uvicorn main:app --host 0.0.0.0 --port "${API_APP_PORT:-8000}"

    user: "10001:10900"

    ports:
      - "${API_PORT}:${API_APP_PORT}"

    depends_on:
      db:
        condition: service_healthy
      catalog:
        condition: service_started
      init-manager-token:
        condition: service_completed_successfully
      init-state-perms:
        condition: service_completed_successfully

    healthcheck:
      test:
        - CMD-SHELL
        - >
          curl -fsS "http://127.0.0.1:${API_APP_PORT:-8000}/health" >/dev/null
      interval: ${API_HEALTHCHECK_INTERVAL}
      timeout: ${API_HEALTHCHECK_TIMEOUT}
      retries: ${API_HEALTHCHECK_RETRIES}



    restart: ${RESTART_POLICY}

  runner-manager:
    build:
      context: ${API_BUILD_CONTEXT}
      dockerfile: ${API_DOCKERFILE}
      network: host
      args:
        INFINITO_CACHE_APT_PROXY:     "${INFINITO_CACHE_APT_PROXY:-}"
        INFINITO_CACHE_PIP_INDEX_URL: "${INFINITO_CACHE_PIP_INDEX_URL:-}"

    container_name: infinito-deployer-runner-manager

    env_file:
      - path: .env
        required: false

    environment:
      STATE_DIR: ${STATE_DIR}
      STATE_HOST_PATH: ${STATE_HOST_PATH}
      JOB_RUNNER_IMAGE: ${JOB_RUNNER_IMAGE}
      # Fallback source when JOB_RUNNER_IMAGE is empty: container_runner.py
      # already does `os.getenv("JOB_RUNNER_IMAGE") or os.getenv("INFINITO_NEXUS_IMAGE")`,
      # so passing the catalog image through makes that fallback actually work.
      INFINITO_NEXUS_IMAGE: ${INFINITO_NEXUS_IMAGE}
      JOB_RUNNER_REPO_DIR: ${JOB_RUNNER_REPO_DIR:-/opt/src/infinito}
      JOB_RUNNER_WORKDIR: ${JOB_RUNNER_WORKDIR:-/workspace}
      JOB_RUNNER_REPO_HOST_PATH: ${JOB_RUNNER_REPO_HOST_PATH:-}
      JOB_RUNNER_DOCKER_ARGS: ${JOB_RUNNER_DOCKER_ARGS:-}
      JOB_RUNNER_ANSIBLE_ARGS: ${JOB_RUNNER_ANSIBLE_ARGS:-}
      JOB_RUNNER_SKIP_CLEANUP: ${JOB_RUNNER_SKIP_CLEANUP:-false}
      JOB_RUNNER_SKIP_BUILD: ${JOB_RUNNER_SKIP_BUILD:-false}
      DOCKER_NETWORK_NAME: ${DOCKER_NETWORK_NAME}
      MANAGER_TOKEN_FILE: ${MANAGER_TOKEN_FILE:-/run/manager/token}

    command:
      - sh
      - -lc
      - umask 0002 && exec uvicorn manager_main:app --host 0.0.0.0 --port 8001

    user: "10003:${DOCKER_SOCKET_GID:-10900}"
    group_add:
      - "10900"

    volumes:
      - type: ${INFINITO_REPO_MOUNT_TYPE:-volume}
        source: ${INFINITO_REPO_MOUNT_SOURCE:-infinito_repo}
        target: ${INFINITO_REPO_PATH}
        read_only: true
      - ${STATE_HOST_PATH}:${STATE_DIR}
      - ${DOCKER_SOCKET_PATH}:/var/run/docker.sock
      - manager_auth:/run/manager:ro
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    depends_on:
      init-manager-token:
        condition: service_completed_successfully
      init-state-perms:
        condition: service_completed_successfully
      catalog:
        condition: service_started

    healthcheck:
      test:
        - CMD-SHELL
        - >
          curl -fsS "http://127.0.0.1:8001/health" >/dev/null
      interval: ${API_HEALTHCHECK_INTERVAL}
      timeout: ${API_HEALTHCHECK_TIMEOUT}
      retries: ${API_HEALTHCHECK_RETRIES}

    restart: ${RESTART_POLICY}

  # ---------------------------------------------------------
  # Web
  # ---------------------------------------------------------
  web:
    build:
      context: ${WEB_BUILD_CONTEXT}
      dockerfile: ${WEB_DOCKERFILE}
      network: host
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_API_STREAM_BASE_URL: ${NEXT_PUBLIC_API_STREAM_BASE_URL}
        INFINITO_CACHE_NPM_REGISTRY: "${INFINITO_CACHE_NPM_REGISTRY:-}"

    container_name: ${WEB_CONTAINER_NAME}

    env_file:
      - path: .env
        required: false

    environment:
      NODE_ENV: ${NODE_ENV}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      NEXT_PUBLIC_API_STREAM_BASE_URL: ${NEXT_PUBLIC_API_STREAM_BASE_URL}
      API_PROXY_TARGET: ${API_PROXY_TARGET:-http://api:8000}
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    ports:
      - "${WEB_PORT}:3000"

    depends_on:
      api:
        condition: service_healthy

    healthcheck:
      test:
        - CMD-SHELL
        - >
          node -e "const os=require('os'); const host=os.hostname(); require('http').get({host,port:3000,path:'/'}, (r) => process.exit(r.statusCode >= 200 && r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

    restart: ${RESTART_POLICY}

  # ---------------------------------------------------------
  # Test target (Arch Linux via SSH)
  # ---------------------------------------------------------
  test-arch:
    profiles: ["test"]
    build:
      context: ./apps/test/arch-ssh
      dockerfile: Dockerfile

    container_name: infinito-deployer-test-arch

    ports:
      - "${TEST_ARCH_SSH_PORT:-2224}:22"

    healthcheck:
      test:
        - CMD-SHELL
        - '[ "$$(cat /proc/1/comm 2>/dev/null)" = "sshd" ]'
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

    restart: ${RESTART_POLICY}

  # ---------------------------------------------------------
  # Test targets (password/key SSH)
  # ---------------------------------------------------------

  # Docker Hub pull-through cache for the e2e test stack. Uses the
  # standard `registry:2` distribution image in proxy mode
  # (REGISTRY_PROXY_REMOTEURL=https://registry-1.docker.io). dockerd
  # inside ssh-password is configured with
  # `--registry-mirror=http://infinito-deployer-registry-cache:5000`
  # plus `insecure-registries`, and routes its docker.io pulls through
  # this cache. Only docker.io is mirrored: ghcr.io / quay.io / etc.
  # go direct from the inner DinD because they have not historically
  # had rate-limit or upstream-IP issues on GitHub-Actions runners
  # (the failing runs 24943727751, 24968576122, 25000929344, 25006674718
  # were all on docker.io content). Per-registry mirroring would need
  # containerd hosts.toml + containerd-snapshotter, which is
  # incompatible with this DinD target's required `vfs` storage driver
  # (overlayfs / fuse-overlayfs both fail in nested DinD).
  #
  # An HTTP_PROXY-based MITM cache (rpardini-proxy) was tried earlier
  # and rejected: BuildKit auto-propagates HTTP_PROXY from dockerd to
  # build containers, and the proxy's CONNECT allow-list rejects
  # non-registry hosts (deb.debian.org, pypi.org, registry.npmjs.org,
  # ...) — `RUN apt-get` / `pip install` / `npm install` then exits 100.
  cache-registry:
    profiles: ["test"]
    build:
      context: ./infrastructure/svc-cache-registry/files
      dockerfile: Dockerfile
    container_name: infinito-deployer-cache-registry
    environment:
      REGISTRY_PROXY_REMOTEURL: https://registry-1.docker.io
      REGISTRY_LOG_ACCESSLOG_DISABLED: "false"
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
      # GC sidecar: cap on-disk size; supersizing accepted (s6 cycles
      # the registry service when above cap, see svc-cache-registry/README).
      CACHE_REGISTRY_MAX_SIZE: ${CACHE_REGISTRY_MAX_SIZE:-16g}
    volumes:
      - type: bind
        source: ${TEST_CACHE_REGISTRY_HOST_PATH:-/tmp/infinito-deployer-e2e/cache-registry}
        target: /var/lib/registry
    networks:
      default:
        ipv4_address: ${TEST_CACHE_REGISTRY_IP:-172.28.0.30}
    cpus: '1.0'
    mem_reservation: 256m
    mem_limit: 1g
    healthcheck:
      test:
        - CMD-SHELL
        - "wget -qO- http://127.0.0.1:5000/v2/ >/dev/null 2>&1"
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    restart: ${RESTART_POLICY}

  # cache-package: single container bundling apt-cacher-ng + devpi-server
  # + verdaccio under s6-overlay v3 so the dashboard build's apt/pip/npm
  # all hit a local pull-through cache instead of public upstream. Build
  # context lives at infrastructure/svc-cache-package/files/ — see that
  # directory's README and docs/requirements/018-... for design details.
  cache-package:
    profiles: ["test"]
    build:
      context: ./infrastructure/svc-cache-package/files
      dockerfile: Dockerfile
    container_name: infinito-deployer-cache-package
    environment:
      # GC sidecar: total cap across apt/pip/npm. When over budget the
      # GC service prunes the largest subdir (see svc-cache-package/README).
      CACHE_PACKAGE_MAX_SIZE: ${CACHE_PACKAGE_MAX_SIZE:-8g}
    volumes:
      - type: bind
        source: ${TEST_CACHE_PACKAGE_HOST_PATH:-/tmp/infinito-deployer-e2e/cache-package}
        target: /state/cache-package
    networks:
      default:
        ipv4_address: ${TEST_CACHE_PACKAGE_IP:-172.28.0.31}
    cpus: '1.5'
    mem_reservation: 512m
    mem_limit: 2g
    healthcheck:
      # Probe all three internal services so a failure in any one of them
      # marks the container unhealthy and the e2e harness fails fast
      # rather than racing into a build that silently uses public upstream.
      test:
        - CMD-SHELL
        - >-
          curl -fsS --max-time 4 http://127.0.0.1:3142/acng-doc/ >/dev/null &&
          curl -fsS --max-time 4 http://127.0.0.1:3141/+api >/dev/null &&
          curl -fsS --max-time 4 http://127.0.0.1:4873/-/ping >/dev/null
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: ${RESTART_POLICY}

  ssh-password:
    profiles: ["test"]
    build:
      context: ./apps/test/ssh-password
      dockerfile: Dockerfile

    container_name: infinito-deployer-ssh-password
    # Nested Docker fails to configure inner veth links when the outer DinD
    # namespace starts with IPv6 disabled. Keep IPv6 proc sysctls writable and
    # enabled here so the inner daemon can deterministically manage them.
    sysctls:
      net.ipv6.conf.all.disable_ipv6: 0
      net.ipv6.conf.default.disable_ipv6: 0
      net.ipv6.conf.lo.disable_ipv6: 0
    cap_add:
      - ALL
    security_opt:
      - apparmor=unconfined
      - seccomp=unconfined
    cgroup: host
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      container: docker
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - type: ${INFINITO_REPO_MOUNT_TYPE:-volume}
        source: ${INFINITO_REPO_MOUNT_SOURCE:-infinito_repo}
        target: ${JOB_RUNNER_REPO_DIR:-/opt/src/infinito}
        read_only: true
      - type: bind
        source: ${TEST_REPO_MIRROR_HOST_PATH:-/tmp/infinito-deployer-e2e/repo-mirrors}
        target: /opt/e2e/repo-mirrors
        read_only: true
      - type: bind
        source: ${TEST_REPO_SEED_HOST_PATH:-/tmp/infinito-deployer-e2e/repo-seeds}
        target: /opt/e2e/repo-seeds
        read_only: true
      # Optional hermetic E2E repo caches improve reproducibility and
      # iteration speed but are not meant to hide real host/container
      # network problems. The cache-registry is consumed via the
      # `--registry-mirror=http://infinito-deployer-cache-registry:5000`
      # CLI flag on dockerd (see ssh-password's Dockerfile), so no MITM
      # CA delivery is required here.

    depends_on:
      catalog:
        condition: service_healthy
      cache-registry:
        condition: service_healthy
      cache-package:
        condition: service_healthy

    networks:
      default:
        ipv4_address: ${TEST_SSH_PASSWORD_IP:-172.28.0.10}

    ports:
      - "${TEST_SSH_PASSWORD_PORT:-2222}:22"

    healthcheck:
      test:
        - CMD-SHELL
        - "systemctl is-active sshd.service docker.service >/dev/null"
      interval: 10s
      timeout: 3s
      retries: 18
      start_period: 25s

    restart: ${RESTART_POLICY}

  ssh-key:
    profiles: ["test"]
    build:
      context: ./apps/test/ssh-key
      dockerfile: Dockerfile

    container_name: infinito-deployer-ssh-key

    ports:
      - "${TEST_SSH_KEY_PORT:-2223}:22"

    healthcheck:
      test:
        - CMD-SHELL
        - '[ "$$(cat /proc/1/comm 2>/dev/null)" = "sshd" ]'
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

    restart: ${RESTART_POLICY}

  # oidc-mock: dummy OpenID Connect provider used by the e2e auth flow.
  # Seeds two test users (e2e-owner@example.com, e2e-member@example.com)
  # and a single client. Test-profile only; never runs in `make up`.
  # See docs/requirements/020-oidc-e2e-via-dummy-provider.md.
  # NOTE: secrets below are clearly marked TEST-ONLY; never reuse in prod.
  oidc-mock:
    profiles: ["test"]
    image: ghcr.io/soluto/oidc-server-mock@sha256:57306baa91e81defee1974e3821516f40b5a6592cb9b072ab48018d3d73c9254
    container_name: infinito-deployer-oidc-mock
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8089"
      SERVER_OPTIONS_INLINE: |
        {
          "AccessTokenJwtType": "JWT",
          "Discovery": { "ShowKeySet": true },
          "Authentication": { "CookieSameSiteMode": "Lax" },
          "IssuerUri": "http://oidc-mock:8089"
        }
      CLIENTS_CONFIGURATION_INLINE: |
        [
          {
            "ClientId":     "infinito-deployer-e2e",
            "ClientSecrets": ["e2e-client-secret-TEST-ONLY"],
            "AllowedGrantTypes": ["authorization_code"],
            "RedirectUris": ["http://localhost:4180/oauth2/callback"],
            "PostLogoutRedirectUris": ["http://localhost:4180/"],
            "AllowedScopes": ["openid", "profile", "email"],
            "RequirePkce": false,
            "RequireClientSecret": true
          }
        ]
      USERS_CONFIGURATION_INLINE: |
        [
          {
            "SubjectId": "e2e-owner",
            "Username":  "e2e-owner",
            "Password":  "e2e-owner-secret-TEST-ONLY",
            "Claims": [
              {"Type": "email",          "Value": "e2e-owner@example.com"},
              {"Type": "email_verified", "Value": "true",  "ValueType": "boolean"},
              {"Type": "name",           "Value": "E2E Owner"}
            ]
          },
          {
            "SubjectId": "e2e-member",
            "Username":  "e2e-member",
            "Password":  "e2e-member-secret-TEST-ONLY",
            "Claims": [
              {"Type": "email",          "Value": "e2e-member@example.com"},
              {"Type": "email_verified", "Value": "true",  "ValueType": "boolean"},
              {"Type": "name",           "Value": "E2E Member"}
            ]
          }
        ]
    networks:
      default:
        ipv4_address: ${TEST_OIDC_MOCK_IP:-172.28.0.40}
    cpus: '0.5'
    mem_reservation: 128m
    mem_limit: 256m
    healthcheck:
      test:
        - CMD-SHELL
        - "wget -qO- http://127.0.0.1:8089/.well-known/openid-configuration >/dev/null 2>&1 || curl -fsS http://127.0.0.1:8089/.well-known/openid-configuration >/dev/null 2>&1"
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    restart: ${RESTART_POLICY}

  # oauth2-proxy: terminates the OIDC flow against oidc-mock and forwards
  # to the `web` upstream with X-Auth-Request-{User,Email} headers set.
  # Test-profile only. cookie-secret is generated per harness run by
  # scripts/e2e/dashboard/run.sh; the placeholder below MUST be overridden.
  # See docs/requirements/020-oidc-e2e-via-dummy-provider.md.
  oauth2-proxy:
    profiles: ["test"]
    # Alpine variant (not distroless) so the compose healthcheck has a
    # shell + wget available; the canonical `:v7.6.0` is scratch-based.
    image: quay.io/oauth2-proxy/oauth2-proxy@sha256:b5b5c619c68592b859080af0351f1ec9193a9723eb3405215d8de3e0c17f6731
    container_name: infinito-deployer-oauth2-proxy
    command:
      - --provider=oidc
      - --oidc-issuer-url=http://oidc-mock:8089
      - --skip-oidc-discovery=false
      - --client-id=infinito-deployer-e2e
      - --client-secret=e2e-client-secret-TEST-ONLY
      - --http-address=0.0.0.0:4180
      - --upstream=http://web:3000
      - --redirect-url=http://localhost:4180/oauth2/callback
      - --email-domain=*
      - --pass-user-headers=true
      - --set-xauthrequest=true
      - --reverse-proxy=true
      - --skip-provider-button=true
      - --insecure-oidc-allow-unverified-email=false
      - --cookie-secure=false
      - --cookie-secret=${OAUTH2_PROXY_COOKIE_SECRET:-PLACEHOLDER-SET-BY-HARNESS}
    ports:
      - "${TEST_OAUTH2_PROXY_PORT:-4180}:4180"
    networks:
      default:
        ipv4_address: ${TEST_OAUTH2_PROXY_IP:-172.28.0.41}
    cpus: '0.5'
    mem_reservation: 128m
    mem_limit: 256m
    depends_on:
      oidc-mock:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - "wget -qO- http://127.0.0.1:4180/ping >/dev/null 2>&1"
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    restart: ${RESTART_POLICY}

networks:
  default:
    name: ${DOCKER_NETWORK_NAME}
    # Nested DinD HTTPS pulls from the ssh-password E2E target stall during
    # TLS handshakes at MTU 1500 in this environment. Pin the outer compose
    # bridge MTU lower so registry client hellos fit without PMTU blackholes.
    driver_opts:
      com.docker.network.driver.mtu: "1400"
    ipam:
      config:
        - subnet: ${DOCKER_NETWORK_SUBNET:-172.28.0.0/24}

volumes:
  infinito_repo:
  postgres_data:
  manager_auth:
