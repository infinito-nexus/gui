# apt-cacher-ng config — minimal pull-through cache for Debian / Ubuntu
# package archives. Listens on the default port 3142. The cache dir is
# overridden to live under the bind-mounted /state path so it survives
# container restarts.
CacheDir: /state/cache-package/apt
LogDir: /var/log/apt-cacher-ng
SupportDir: /usr/lib/apt-cacher-ng

Port: 3142
BindAddress: 0.0.0.0

# Soft cap at 4 GB (per requirement 018). Older content is trimmed by
# `apt-cacher-ng -e` (executed periodically by s6-rc 'gc' service if
# enabled later); this directive controls when the periodic cleanup
# starts deleting.
ExTreshold: 4

# Allow access from any container on the compose network. The cache is
# never published to the host so this is internal-only.
LocalDirs: acng-doc /usr/share/doc/apt-cacher-ng
PassThroughPattern: .*
ConnectProto: v4

# Don't pretend to be a generic HTTP proxy for arbitrary domains.
DontCache: askubuntu.com|stackoverflow.com|launchpad.net

VerboseLog: 0
