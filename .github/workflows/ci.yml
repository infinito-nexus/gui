name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-ruff:
    uses: ./.github/workflows/ruff.yml

  tests:
    uses: ./.github/workflows/tests.yml
