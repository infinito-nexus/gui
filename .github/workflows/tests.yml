name: Tests (unittest via make)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  max-lines:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce max file length
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/check-max-lines.sh

  supply-chain:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install pip-audit
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Audit locked Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          pip-audit -r apps/api/requirements.lock --desc off

      - name: Install frontend dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd apps/web
          npm ci

      - name: Audit frontend dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd apps/web
          npm audit --audit-level=critical

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # The integration tests in tests/python/integration/ bring up the full
    # docker-compose stack via `make test-up`, so the API needs the same
    # pinned-digest images the perf job uses. Without these the API
    # container reads JOB_RUNNER_IMAGE='' from env.example and 500s
    # `JOB_RUNNER_IMAGE (or INFINITO_NEXUS_IMAGE) must be set for container
    # runner` on the first POST /api/deployments.
    env:
      INFINITO_NEXUS_IMAGE: ghcr.io/infinito-nexus/core/debian@sha256:b494b40a45823fbefea7936c20f512582496a2e977a5c5ad3511775e98e83023
      JOB_RUNNER_IMAGE: ghcr.io/infinito-nexus/core/arch@sha256:9d6c7709caab53eeb1f227a1002f06df29990dfa0c4d41ca7cb84594c081f2cb
      POSTGRES_IMAGE: postgres@sha256:4327b9fd295502f326f44153a1045a7170ddbfffed1c3829798328556cfd09e2
      INFINITO_ENFORCE_DIGEST_PINNING: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          make test

      - name: Dump container logs on failure
        if: failure()
        shell: bash
        run: bash scripts/ci/dump-container-logs.sh

  web-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          npm ci

      - name: Lint frontend
        shell: bash
        run: |
          set -euo pipefail
          npm run lint

      - name: Typecheck frontend
        shell: bash
        run: |
          set -euo pipefail
          npm run typecheck

  web-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          npm ci

      - name: Install Playwright browser
        shell: bash
        run: |
          set -euo pipefail
          npx playwright install --with-deps chromium

      - name: Run role dashboard scope/animation regression e2e
        shell: bash
        run: |
          set -euo pipefail
          npm run test:e2e -- role_dashboard_scope_row_mode.spec.ts

      - name: Run workspace history e2e
        shell: bash
        run: |
          set -euo pipefail
          npm run test:e2e -- workspace_history.spec.ts

      - name: Run audit logs e2e
        shell: bash
        run: |
          set -euo pipefail
          npm run test:e2e -- audit_logs.spec.ts

  web-dashboard-deploy-e2e:
    runs-on: ubuntu-latest
    # Local runs of `make e2e-dashboard-local-docker` (2 tests) take 14–22 min.
    # GitHub-hosted runners are slower (~2× CPU) and Playwright's per-spec
    # timeout is 50 min, so the workflow needs >50 min to surface a real
    # failure instead of being killed by the workflow timeout itself.
    # Raised to 180 min (3 h) as a safety net while we investigate hangs in
    # the deployment flow caused by digest-pinned runner image pull latency
    # — without headroom, real failures get masked by the workflow timeout.
    timeout-minutes: 180
    env:
      INFINITO_E2E_CATALOG_IMAGE: ghcr.io/infinito-nexus/core/debian@sha256:b494b40a45823fbefea7936c20f512582496a2e977a5c5ad3511775e98e83023
      INFINITO_E2E_JOB_RUNNER_IMAGE: ghcr.io/infinito-nexus/core/arch@sha256:9d6c7709caab53eeb1f227a1002f06df29990dfa0c4d41ca7cb84594c081f2cb
      INFINITO_E2E_POSTGRES_IMAGE: postgres@sha256:4327b9fd295502f326f44153a1045a7170ddbfffed1c3829798328556cfd09e2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space on runner
        shell: bash
        run: |
          # GitHub-hosted runners ship ~14 GiB free on /. The dashboard E2E
          # builds the deployer + dashboard images locally inside ssh-password
          # nested DinD which can blow past that budget — observed previously
          # when the perf + dashboard jobs hit `ENOSPC: no space left on
          # device` during `npm install` / Playwright browser writes.
          # Strip the toolcaches we never use here to recover ~25 GiB.
          set -euo pipefail
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL "${AGENT_TOOLSDIRECTORY:-}" || true
          sudo apt-get clean -y || true
          docker image prune -af || true
          df -h /

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Run real dashboard deploy e2e
        shell: bash
        run: |
          set -euo pipefail
          make e2e-dashboard-ci

      - name: Dump container logs on failure
        if: failure()
        shell: bash
        run: bash scripts/ci/dump-container-logs.sh

  web-dashboard-oidc-e2e:
    runs-on: ubuntu-latest
    # OIDC login spec only — fast (single test, no real deploy). 30 min
    # is generous; the spec itself runs in <1 min once the test stack is
    # up. The bulk of wallclock is starting api + db + catalog +
    # runner-manager + web + ssh-password + cache-* + oidc-mock +
    # oauth2-proxy.
    timeout-minutes: 60
    env:
      INFINITO_E2E_CATALOG_IMAGE: ghcr.io/infinito-nexus/core/debian@sha256:b494b40a45823fbefea7936c20f512582496a2e977a5c5ad3511775e98e83023
      INFINITO_E2E_JOB_RUNNER_IMAGE: ghcr.io/infinito-nexus/core/arch@sha256:9d6c7709caab53eeb1f227a1002f06df29990dfa0c4d41ca7cb84594c081f2cb
      INFINITO_E2E_POSTGRES_IMAGE: postgres@sha256:4327b9fd295502f326f44153a1045a7170ddbfffed1c3829798328556cfd09e2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space on runner
        shell: bash
        run: |
          # Same disk-pressure mitigation as web-dashboard-deploy-e2e —
          # the OIDC variant brings up the same test stack PLUS oauth2-
          # proxy + oidc-mock, so the budget is even tighter.
          set -euo pipefail
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL "${AGENT_TOOLSDIRECTORY:-}" || true
          sudo apt-get clean -y || true
          docker image prune -af || true
          df -h /

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Run OIDC login e2e
        shell: bash
        run: |
          set -euo pipefail
          make e2e-dashboard-ci-docker-oidc

      - name: Dump container logs on failure
        if: failure()
        shell: bash
        run: bash scripts/ci/dump-container-logs.sh

  perf:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      INFINITO_NEXUS_IMAGE: ghcr.io/infinito-nexus/core/debian@sha256:b494b40a45823fbefea7936c20f512582496a2e977a5c5ad3511775e98e83023
      JOB_RUNNER_IMAGE: ghcr.io/infinito-nexus/core/arch@sha256:9d6c7709caab53eeb1f227a1002f06df29990dfa0c4d41ca7cb84594c081f2cb
      POSTGRES_IMAGE: postgres@sha256:4327b9fd295502f326f44153a1045a7170ddbfffed1c3829798328556cfd09e2
      INFINITO_ENFORCE_DIGEST_PINNING: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space on runner
        shell: bash
        run: |
          # The perf job runs the full test stack (api + db + catalog +
          # runner-manager + web + ssh-password + cache-registry +
          # cache-package), then a Playwright spec on top. Combined with
          # GitHub-runner's pre-installed toolcaches this blew past disk
          # budget and surfaced as `ENOSPC: no space left on device` in
          # the Playwright spec phase. Strip unused toolcaches up-front.
          set -euo pipefail
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL "${AGENT_TOOLSDIRECTORY:-}" || true
          sudo apt-get clean -y || true
          docker image prune -af || true
          df -h /

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd apps/web
          npm ci

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          make install

      - name: Run perf harness
        shell: bash
        run: |
          set -euo pipefail
          make test-perf

      - name: Dump container logs on failure
        if: failure()
        shell: bash
        run: bash scripts/ci/dump-container-logs.sh

      - name: Upload perf artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: perf-016-artifacts
          path: state/perf/016
          if-no-files-found: ignore
