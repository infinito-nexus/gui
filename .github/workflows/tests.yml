name: Tests (unittest via make)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  max-lines:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce max file length
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/check-max-lines.sh

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          make test

  web-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          npm ci

      - name: Lint frontend
        shell: bash
        run: |
          set -euo pipefail
          npm run lint

      - name: Typecheck frontend
        shell: bash
        run: |
          set -euo pipefail
          npm run typecheck

  web-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          npm ci

      - name: Install Playwright browser
        shell: bash
        run: |
          set -euo pipefail
          npx playwright install --with-deps chromium

      - name: Run role dashboard scope/animation regression e2e
        shell: bash
        run: |
          set -euo pipefail
          npm run test:e2e -- role_dashboard_scope_row_mode.spec.ts

      - name: Run workspace history e2e
        shell: bash
        run: |
          set -euo pipefail
          npm run test:e2e -- workspace_history.spec.ts

  web-dashboard-deploy-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Run real dashboard deploy e2e
        shell: bash
        run: |
          set -euo pipefail
          make e2e-dashboard-ci
