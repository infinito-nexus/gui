name: Checks

on:
  workflow_call:

permissions:
  contents: read

jobs:
  supply-chain:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install pip-audit
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Audit locked Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          pip-audit -r apps/api/requirements.lock --desc off

      - name: Install frontend dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd apps/web
          npm ci

      - name: Audit frontend dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd apps/web
          npm audit --audit-level=critical
